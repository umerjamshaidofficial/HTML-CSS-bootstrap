<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ProjectX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar shadow" id="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-list burger-icon" id="sidebar-toggle"></i>
            <span class="ms-3 fw-bold text-white project-title">ProjectX</span>
        </div>

        <nav class="nav flex-column mt-3">
            <a class="nav-link" href="#"><i class="bi bi-house"></i> <span>Home</span></a>
            <a class="nav-link" href="#"><i class="bi bi-graph-up"></i> <span>Analytics</span></a>
            <a class="nav-link" href="#"><i class="bi bi-gear"></i> <span>Settings</span></a>
        </nav>

        <a class="logout-link" href="index.html">
            <i class="bi bi-box-arrow-left"></i> <span>Logout</span>
        </a>
    </div>

    <div class="main-wrapper" id="main-content">
        <nav class="navbar border-bottom px-4 bg-white">
            <span class="navbar-brand fw-bold">Overview</span>
            <div class="d-flex align-items-center">
                <span class="me-3 small fw-semibold">John Doe</span>
                <div class="user-avatar">JD</div>
            </div>
        </nav>

        <div class="p-4">
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card stat-card p-4">
                        <small class="text-muted fw-bold">TOTAL USERS</small>
                        <h2 class="fw-bold mb-0">1,250 <small class="text-success fs-6">↑ 12%</small></h2>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card stat-card p-4">
                        <small class="text-muted fw-bold">ACTIVE NOW</small>
                        <h2 class="fw-bold mb-0">43</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('sidebar-toggle');
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('main-content');

        btn.addEventListener('click', () => {
            sidebar.classList.toggle('closed');
            content.classList.toggle('expanded');
        });
    </script>
</body>
</html>
