<!doctype html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>my-awesome-project</title>
    <style>
        body, html {
            height: 100%;
            overflow: hidden; 
            font-family: 'Inter', sans-serif;
        }

        .form-control {
            padding: 0.6rem 1rem;
        }

        .text-primary-custom {
            color: #0d6efd !important;
        }
    </style>
</head>
<body class="bg-light"> 
    <div class="container-fluid vh-100 d-flex align-items-center justify-content-center">
        <div class="col-11 col-sm-8 col-md-5 col-lg-4 col-xl-3">
            
            <div class="card border-0 shadow-lg rounded-4 p-3">
                <div class="card-body">
                    
                    <div class="text-center mb-3">
                        <div class="bg-primary d-inline-block rounded-circle mb-2" style="width: 50px; height: 50px;"></div>
                        <h4 class="fw-bold mb-1">Welcome</h4>
                    </div>

                    <form id="loginForm">
                        <div class="mb-2">
                            <label class="form-label small fw-bold mb-1">Email Address</label>
                            <input type="email" id="email" class="form-control bg-light border-0" placeholder="name@company.com" required>
                        </div>

                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <label class="form-label small fw-bold mb-1">Password</label>
                            </div>
                            <input type="password" id="password" class="form-control bg-light border-0" placeholder="password" required>
                              <a href="#" class="small text-decoration-none text-primary-custom">Forgot password?</a>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 rounded-pill shadow-sm fw-bold mt-2 py-2">
                            Sign In
                        </button>
                    </form>

                    <p class="text-center mt-3 mb-0 small text-muted">
                        Already have an account? <a href="#" class="fw-bold text-decoration-none text-primary-custom">Create one</a>
                    </p>

                </div>
            </div>

        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (email.trim() !== "" && password.trim() !== "") {
                window.location.href = "dashboard.html";
            }
        });
    </script>
</body>
</html>
